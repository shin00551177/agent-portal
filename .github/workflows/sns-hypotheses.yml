name: SNS Hypothesis Auto-Generate

on:
  schedule:
    # 毎朝8時と夜20時（JST）に実行 = UTC 23:00 / 11:00
    - cron: "0 23 * * *"
    - cron: "0 11 * * *"
  workflow_dispatch: # 手動実行も可能

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate hypotheses for all active apps
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.PORTAL_URL }}/api/cron/sns-hypotheses" | jq .
