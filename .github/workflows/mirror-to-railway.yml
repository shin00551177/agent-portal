name: Mirror to Railway repo

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  mirror:
    if: github.repository == 'torilab-ai/op-agent-ASO-SNS'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to shin00551177/agent-portal
        env:
          GH_TOKEN: ${{ secrets.MIRROR_TOKEN }}
        run: |
          git config --global user.email "mirror@github.com"
          git config --global user.name "Mirror Bot"
          gh auth setup-git
          git remote add mirror https://github.com/shin00551177/agent-portal.git
          git push mirror HEAD:main --force
